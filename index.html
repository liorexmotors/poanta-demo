<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#070b10">
  <title>פואנטה</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root{
      --bg:#070b10;--bg2:#0a0f15;--ink:#f6f8fb;--text:#e7ebf0;--muted:#8e97a3;--muted2:#626c78;
      --line:rgba(255,255,255,.085);--line2:rgba(255,255,255,.055);--accent:#e8bd63;--accent2:#9f7933;
      --card:#0b1118;--pill:#101821;--red:#ff5f6f;--purple:#b99cff;--green:#62d39b;--blue:#82b5ff;
    }
    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 65% -12%,rgba(232,189,99,.14),transparent 30%),linear-gradient(180deg,#070b10 0%,#04070a 82%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;overflow-x:hidden}
    a{color:inherit;text-decoration:none} button{font:inherit;color:inherit}
    .app{width:100%;max-width:430px;min-height:100vh;margin:0 auto;padding:14px 16px calc(90px + env(safe-area-inset-bottom));position:relative;background:linear-gradient(180deg,rgba(255,255,255,.018),transparent 260px)}
    .statusbar{direction:ltr;display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:15px;font-weight:800;margin:0 0 14px}.phone-icons{display:flex;gap:7px;align-items:center}.signal{width:17px;height:11px;border-radius:2px;background:linear-gradient(90deg,#fff 45%,rgba(255,255,255,.35) 45%)}.battery{width:24px;height:12px;border:2px solid #fff;border-radius:4px;position:relative}.battery:before{content:"";position:absolute;inset:2px 4px 2px 2px;background:#fff;border-radius:2px}.battery:after{content:"";position:absolute;left:-5px;top:3px;width:3px;height:6px;border-radius:2px;background:#fff}
    .header{position:sticky;top:0;z-index:3;margin:0 -16px;padding:0 16px 10px;background:linear-gradient(180deg,rgba(7,11,16,.98),rgba(7,11,16,.92) 72%,rgba(7,11,16,0));backdrop-filter:blur(12px)}
    .brand-row{direction:ltr;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.brand{font-size:24px;letter-spacing:.2px;font-weight:900}.menu-btn{width:34px;height:34px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.025);display:grid;place-items:center;color:var(--muted)}
    .tabs{display:flex;gap:17px;overflow:auto;white-space:nowrap;scrollbar-width:none;padding:3px 0 8px;color:#858f9c;font-size:14px;font-weight:800}.tabs::-webkit-scrollbar{display:none}.tab.active{color:#fff}.tab.active:after{content:"";display:block;height:2px;border-radius:3px;background:var(--accent);margin-top:6px}.update-pill{height:34px;border:1px solid rgba(232,189,99,.16);background:rgba(14,21,29,.86);border-radius:14px;color:#cbd2dc;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.24)}.update-pill strong{color:var(--accent);font-weight:900}.update-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px rgba(232,189,99,.65)}
    .feed{display:flex;flex-direction:column}.story{padding:18px 0 16px;border-bottom:1px solid var(--line2)}
    .story-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;color:var(--muted);font-size:13px;font-weight:800}.story-time{direction:ltr;color:#a4adb8}.story-topic{color:var(--accent);max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}
    .story-main{display:flex;direction:rtl;gap:11px;align-items:flex-start}.thumb{width:92px;height:92px;flex:0 0 92px;border-radius:18px;background-color:#17202b;background-image:radial-gradient(circle at 65% 30%,rgba(255,255,255,.20),transparent 24%),radial-gradient(circle at 20% 78%,rgba(232,189,99,.16),transparent 30%),linear-gradient(135deg,#263241,#101720);background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),0 10px 26px rgba(0,0,0,.26);overflow:hidden}.thumb.no-image{display:grid;place-items:center}.thumb.no-image:before{content:"P";direction:ltr;color:rgba(232,189,99,.52);font-size:34px;font-weight:950}
    .story-copy{min-width:0;flex:1;text-align:right}.headline{font-size:22px;line-height:1.06;margin:0 0 7px;font-weight:950;letter-spacing:-.2px;color:#fff;text-wrap:balance}.summary{margin:0;color:#c8d0da;font-size:15px;line-height:1.42;font-weight:500;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.insight{margin-top:8px;display:flex;align-items:flex-start;gap:7px;color:#dce2e9;font-size:13.5px;line-height:1.35}.insight-icon{direction:ltr;width:19px;height:19px;flex:0 0 19px;border-radius:50%;border:1px solid rgba(232,189,99,.36);color:var(--accent);display:grid;place-items:center;font-size:11px;font-weight:950}.insight-text{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .story-divider{height:1px;background:var(--line);margin:12px 0 8px}.source-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.original-title{min-width:0;flex:1;color:#bfc7d2;font-size:13.5px;line-height:1.25;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}.source-brand{direction:ltr;flex:0 0 auto;display:flex;align-items:center;gap:6px;color:#d9dee6;font-size:12.5px;font-weight:900}.source-icon{width:22px;height:22px;border-radius:8px;display:grid;place-items:center;background:#111927;border:1px solid rgba(255,255,255,.10);font-size:9px;box-shadow:0 8px 18px rgba(0,0,0,.20)}.source-icon.ynet{color:#ff6b6b}.source-icon.walla{color:#b99cff}.source-icon.haaretz{color:#d8c4a6}.source-icon.globes{color:#74dbc2}.source-icon.israel{color:#8fd7ff}.source-icon.n12{color:#ff5868}.source-icon.other{color:#d9dee6}
    .bottom-nav{position:fixed;z-index:6;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;padding:10px 18px calc(9px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(7,11,16,.74),rgba(7,11,16,.98));backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.nav-item{display:grid;gap:4px;place-items:center;color:#6f7985;font-size:11px;font-weight:800}.nav-item.active{color:var(--accent)}.nav-icon{font-size:19px;line-height:1}
    .empty{padding:40px 0;color:var(--muted);text-align:center}.hidden{display:none!important}
    @media(min-width:760px){body{background:#020407}.app{border-inline:1px solid rgba(255,255,255,.07);box-shadow:0 0 80px rgba(0,0,0,.55)}}
    @media(max-width:370px){.app{padding-inline:13px}.header{margin-inline:-13px;padding-inline:13px}.story-main{gap:9px}.thumb{width:82px;height:82px;flex-basis:82px;border-radius:16px}.headline{font-size:20px}.summary{font-size:14px}.insight{font-size:13px}.tabs{gap:14px}.original-title{font-size:13px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="statusbar"><span>9:41</span><span class="phone-icons"><span>5G</span><span class="signal"></span><span class="battery"></span></span></div>
      <div class="brand-row"><button class="menu-btn" aria-label="תפריט">≡</button><div class="brand">Pointa</div></div>
      <nav class="tabs" id="tabs" aria-label="תחומים">
        <button class="tab active" data-filter="all">הכל</button><button class="tab" data-filter="חדשות">חדשות</button><button class="tab" data-filter="בארץ">בארץ</button><button class="tab" data-filter="עולם">עולם</button><button class="tab" data-filter="כלכלה">כלכלה</button><button class="tab" data-filter="טכנולוגיה">טכנולוגיה</button><button class="tab" data-filter="ספורט">ספורט</button>
      </nav>
      <button class="update-pill" id="refreshBtn"><span class="update-dot"></span><strong>3 עדכונים חדשים</strong><span id="updatedAt">מאז הפעם האחרונה</span></button>
    </header>
    <section id="feedCards" class="feed" aria-label="פיד פואנטה"></section>
    <div id="emptyState" class="empty hidden">אין אייטמים בקטגוריה הזו כרגע</div>
  </main>
  <nav class="bottom-nav" aria-label="ניווט תחתון">
    <a class="nav-item"><span class="nav-icon">⋯</span><span>עוד</span></a>
    <a class="nav-item"><span class="nav-icon">⌕</span><span>חיפוש</span></a>
    <a class="nav-item active"><span class="nav-icon">⌂</span><span>בית</span></a>
    <a class="nav-item"><span class="nav-icon">♡</span><span>שמור</span></a>
    <a class="nav-item"><span class="nav-icon">◌</span><span>פרופיל</span></a>
  </nav>
  <script>
    const POANTA_FEED_VERSION = '20260511-layout-v1';
    const embeddedFeed = {"updatedAt":"2026-05-11T21:20:00+03:00","items":[{"category":"ביטחון","source":"ynet","sourceLogo":"ynet","sourceUrl":"https://www.ynet.co.il/news/article/r1smty11ml","imageUrl":"","headline":"ראש המוסד מזהיר שמינוי גופמן מסוכן לארגון","originalTitle":"\"סכנה חמורה\": המסמך המלא, התקדימי והחריף של ראש המוסד נגד מחליפו המיועד","context":"דדי ברנע העביר לבג״ץ חוות דעת חריפה נגד מינוי רומן גופמן לראשות המוסד, ומתמקד בהתנהלותו בפרשת הנער אלמקייס.","takeaway":"הסיפור הוא לא רק מי יעמוד בראש המוסד — אלא האם מינוי ביטחוני בכיר יכול לעבור למרות אזהרה פנימית חריגה."}]};
    const host = document.getElementById('feedCards');
    const updatedAt = document.getElementById('updatedAt');
    const emptyState = document.getElementById('emptyState');
    let currentFeed = embeddedFeed;
    let activeFilter = 'all';

    function esc(value){ return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
    function sourceClass(source){ const s=String(source||'').toLowerCase(); if(s.includes('n12')||s.includes('mako'))return'n12'; if(s.includes('וואלה')||s.includes('walla'))return'walla'; if(s.includes('ynet'))return'ynet'; if(s.includes('גלובס'))return'globes'; if(s.includes('הארץ'))return'haaretz'; if(s.includes('ישראל'))return'israel'; return'other'; }
    function logo(item){ return String(item.sourceLogo || item.source || 'מקור').split(' ')[0].slice(0,4); }
    function timeFor(index){ const now=new Date(); now.setMinutes(now.getMinutes()-index*7); return now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}); }
    function topicFor(item){ const c=String(item.category||'חדשות'); if(c==='פוליטיקה') return 'בארץ'; return c; }
    function sourceName(item){ return String(item.source || item.sourceLogo || 'מקור'); }
    function story(item,index){ const hasImage=Boolean(item.imageUrl); const imgStyle=hasImage?` style="background-image:url(&quot;${esc(item.imageUrl)}&quot;)"`:''; const cls=sourceClass(item.source); return `<article class="story" data-category="${esc(item.category||'חדשות')}">
      <div class="story-top"><time class="story-time">${timeFor(index)}</time><span class="story-topic">${esc(topicFor(item))}</span></div>
      <div class="story-main">
        <a class="thumb${hasImage?'':' no-image'}" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener" aria-label="${esc(item.originalTitle||item.headline)}"${imgStyle}></a>
        <div class="story-copy"><h2 class="headline">${esc(item.headline)}</h2><p class="summary">${esc(item.context)}</p><div class="insight"><span class="insight-icon">!</span><span class="insight-text">${esc(item.takeaway)}</span></div></div>
      </div>
      <div class="story-divider"></div>
      <div class="source-row"><a class="original-title" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener">${esc(item.originalTitle)}</a><a class="source-brand" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener"><span>${esc(sourceName(item))}</span><span class="source-icon ${cls}">${esc(logo(item))}</span></a></div>
    </article>`; }
    function visibleItems(){ const items=(currentFeed&&Array.isArray(currentFeed.items))?currentFeed.items:[]; if(activeFilter==='all') return items; return items.filter(i => topicFor(i)===activeFilter || i.category===activeFilter); }
    function render(feed){ currentFeed=feed||embeddedFeed; const items=visibleItems(); host.innerHTML=items.map(story).join(''); emptyState.classList.toggle('hidden',items.length>0); if(currentFeed.updatedAt){ try{updatedAt.textContent='עודכן '+new Date(currentFeed.updatedAt).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});}catch{updatedAt.textContent='עודכן עכשיו';}} }
    document.getElementById('tabs').addEventListener('click',ev=>{ const btn=ev.target.closest('.tab'); if(!btn) return; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); activeFilter=btn.dataset.filter||'all'; render(currentFeed); });
    document.getElementById('refreshBtn').addEventListener('click',()=>fetchFeed(true));
    function fetchFeed(force=false){ const v=force?Date.now():POANTA_FEED_VERSION; return fetch('feed.json?v='+encodeURIComponent(v),{cache:'reload'}).then(r=>r.ok?r.json():embeddedFeed).then(render).catch(()=>render(embeddedFeed)); }
    fetchFeed();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>null);
  </script>
</body>
</html>
