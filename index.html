<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#061014">
<title>Pointa</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@500;600;700;800;900&family=Inter:wght@500;600;700;800;900&display=swap');
:root{
  --bg:#061014; --card:#0B151A; --card-secondary:#0A1217; --border:rgba(255,255,255,.145);
  --soft:rgba(255,255,255,.085); --text:#F6F7F8; --secondary:#C8CDD2; --muted:#8F979E; --very-muted:#6F777E;
  --yellow:#FFC400; --yellow-hover:#F2B900; --nav:rgba(11,18,22,.95);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#020608;color:var(--text);font-family:"Heebo",Arial,sans-serif;text-rendering:geometricPrecision;-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center;padding:18px}
a{color:inherit;text-decoration:none}button{font:inherit;color:inherit;background:none;border:0;padding:0}
.phone{width:430px;max-width:100%;min-height:932px;border-radius:38px;overflow:hidden;position:relative;background:radial-gradient(circle at 28% 0%,rgba(255,196,0,.055),transparent 28%),radial-gradient(circle at 88% 18%,rgba(255,255,255,.045),transparent 22%),linear-gradient(180deg,#071116 0%,#061014 55%,#060d11 100%);box-shadow:0 24px 70px rgba(0,0,0,.46);border:1px solid rgba(255,255,255,.08)}
.screen{min-height:932px;padding:18px 16px 96px;position:relative}
.status{direction:ltr;height:34px;padding:0 7px;display:flex;align-items:center;justify-content:space-between;font-size:18px;font-weight:800;line-height:1;color:#fff;font-family:"Heebo","Inter",Arial,sans-serif}
.icons{display:flex;align-items:center;gap:7px}.signal{width:24px;height:15px;display:flex;gap:3px;align-items:flex-end}
.signal span{width:4px;background:#fff;border-radius:4px}.signal span:nth-child(1){height:5px}.signal span:nth-child(2){height:8px}.signal span:nth-child(3){height:11px}.signal span:nth-child(4){height:14px}
.wifi{width:21px;height:15px;position:relative;overflow:hidden}.wifi:before,.wifi:after{content:"";position:absolute;left:50%;transform:translateX(-50%);border:2.4px solid #fff;border-color:#fff transparent transparent;border-radius:999px}
.wifi:before{width:22px;height:22px;top:2px}.wifi:after{width:12px;height:12px;top:8px}
.battery{width:28px;height:14px;border:2px solid white;border-radius:4px;position:relative;padding:1px}.battery:after{content:"";position:absolute;right:-5px;top:3px;width:3px;height:6px;background:white;border-radius:0 2px 2px 0}.battery div{width:19px;height:8px;background:white;border-radius:2px}
.header{margin-top:20px;display:flex;align-items:center;justify-content:space-between;direction:ltr}
.brand{display:flex;align-items:center;gap:12px}.mark{width:54px;height:54px;background:linear-gradient(135deg,#ffd84f,#ffc400 70%);border-radius:17px 17px 17px 5px;position:relative;box-shadow:0 10px 22px rgba(255,196,0,.22)}
.mark:after{content:"";position:absolute;left:0;bottom:-10px;border-top:18px solid var(--yellow);border-right:18px solid transparent}
.mark i{position:absolute;right:13px;height:4px;background:#0a0d0f;border-radius:20px}.mark i:nth-child(1){top:15px;width:28px}.mark i:nth-child(2){top:26px;width:28px}.mark i:nth-child(3){top:37px;width:19px}
.logo-text{font-size:31px;font-weight:900;letter-spacing:-.9px;color:#fff;line-height:1}.bell{position:relative;width:34px;height:34px;color:white}
.bell svg{width:34px;height:34px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bell:after{content:"";position:absolute;top:5px;right:2px;width:8px;height:8px;background:var(--yellow);border-radius:50%;box-shadow:0 0 0 3px rgba(255,196,0,.12)}
.tabs{margin-top:32px;display:flex;justify-content:space-between;align-items:flex-end;gap:14px;color:#838B92;font-size:16px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{padding-bottom:11px;position:relative;white-space:nowrap;cursor:pointer}.tab.active{color:#F3F3F3;font-weight:900}.tab.active:after{content:"";position:absolute;bottom:0;right:50%;transform:translateX(50%);height:4px;width:37px;border-radius:99px;background:var(--yellow)}
.updates{margin-top:8px;height:43px;border:1px solid var(--border);border-radius:11px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));display:flex;align-items:center;justify-content:space-between;padding:0 13px;color:#F1F2F3;font-size:16px;font-weight:700;line-height:1.3;gap:10px}
.updates .spark{color:var(--yellow);font-size:22px}.updates .chev{font-size:24px;margin-top:-4px}
.feed{margin-top:13px;display:flex;flex-direction:column;gap:10px}.card{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:radial-gradient(circle at 10% 0%,rgba(255,255,255,.045),transparent 26%),linear-gradient(180deg,rgba(255,255,255,.038),rgba(255,255,255,.016)),var(--card);box-shadow:0 8px 22px rgba(0,0,0,.22)}.inner{padding:15px 13px 0}
.meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:14px;font-weight:700;line-height:1.2;margin-bottom:7px}
.cat{display:flex;align-items:center;gap:8px}.dot{width:11px;height:11px;border-radius:50%;background:var(--yellow);box-shadow:0 0 0 4px rgba(255,196,0,.09)}
.content{display:grid;grid-template-columns:1fr 120px;gap:13px;align-items:center;min-height:135px;direction:rtl}.txt{text-align:center;min-width:0}
h2{margin:0 0 12px;font-size:23px;line-height:1.24;font-weight:900;letter-spacing:-.35px;color:#fff;text-align:center;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.summary{margin:0 0 12px;color:var(--secondary);font-size:15.5px;line-height:1.58;font-weight:500;text-align:center;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.insight{color:var(--yellow);font-size:16px;font-weight:900;line-height:1.2;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.img{width:120px;height:108px;border-radius:14px;border:1px solid rgba(255,255,255,.08);object-fit:cover;background:#162027;display:block}
.img.placeholder{display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 65% 30%,rgba(255,196,0,.16),transparent 28%),linear-gradient(135deg,#17242b,#0a1115);color:rgba(255,196,0,.55);font-size:34px;font-weight:950}
.source{margin-top:13px;border-top:1px solid var(--soft);min-height:58px;display:grid;grid-template-columns:100px 1fr 24px;align-items:center;gap:7px;direction:ltr}
.slogo{display:flex;align-items:center;gap:8px;color:#DCE0E4;font-weight:900;font-size:19px;line-height:1.1;white-space:nowrap;min-width:0}.slogo span:last-child{overflow:hidden;text-overflow:ellipsis}
.sym{width:32px;height:32px;flex:0 0 32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;overflow:hidden}
.ynet{background:#e51f2d;font-family:Georgia,serif;font-size:22px;font-weight:900}.marker{background:#13bf55;font-size:13px;text-align:center;line-height:1;font-weight:900}.tech{background:#7519ff;font-size:13px;font-weight:900}.walla{background:#6927ff;font-size:14px;font-weight:900}.n12{background:#e51f2d;font-size:13px;font-weight:900}.israel{background:#148bff;font-size:13px;font-weight:900}.other{background:#24313a;font-size:13px;font-weight:900}
.orig{color:#8D949A;font-size:15.2px;line-height:1.35;text-align:right;direction:rtl;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.arrow{color:#eef1f3;font-size:31px;font-weight:300;line-height:1;text-align:center}
.nav{position:absolute;left:16px;right:16px;bottom:14px;height:70px;background:var(--nav);border:1px solid var(--border);border-radius:12px;display:grid;grid-template-columns:repeat(5,1fr);backdrop-filter:blur(18px);z-index:20}
.navitem{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#a5acb2;font-size:13px;font-weight:600;gap:4px}.navitem svg{width:27px;height:27px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.navitem.active{color:var(--yellow);font-weight:850}.navitem.active svg{fill:var(--yellow);stroke:var(--yellow)}
.homebar{position:absolute;left:50%;bottom:4px;transform:translateX(-50%);width:142px;height:5px;border-radius:10px;background:white;z-index:21}
.empty{padding:34px 0;text-align:center;color:var(--muted);font-weight:700;font-size:14px}.hidden{display:none!important}
.btn{min-height:38px;height:40px;border-radius:999px;padding:0 18px;font-size:14.5px;font-weight:800;line-height:1;display:inline-flex;align-items:center;justify-content:center}.btn.primary{background:var(--yellow);color:#0B0B0B}.btn.primary:hover{background:var(--yellow-hover)}.btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.modal-title,.settings-title{margin:0;color:var(--text);font-size:21px;font-weight:900;line-height:1.2}.settings-body{color:var(--muted);font-size:14px;font-weight:500;line-height:1.45}
@media(max-width:480px){body{padding:0;background:var(--bg)}.phone{width:100%;min-height:100vh;border-radius:0;border:none}.screen{min-height:100vh}}
@media(max-width:390px){.tabs{gap:10px;font-size:15px}.content{grid-template-columns:1fr 112px;gap:10px}.img{width:112px;height:104px}h2{font-size:21px}.summary{font-size:14.5px}.updates{font-size:14.5px}}
@media(min-width:720px){.logo-text{font-size:38px}h2{font-size:30px}.summary{font-size:16px}.screen{padding-left:20px;padding-right:20px}.content{grid-template-columns:1fr 132px}.img{width:132px;height:116px}}
</style>
</head>
<body>
<main class="phone">
<section class="screen">
  <div class="status"><div>9:41</div><div class="icons"><div class="signal"><span></span><span></span><span></span><span></span></div><div class="wifi"></div><div class="battery"><div></div></div></div></div>
  <header class="header"><div class="brand"><div class="mark"><i></i><i></i><i></i></div><div class="logo-text">Pointa</div></div><div class="bell"><svg viewBox="0 0 24 24"><path d="M15 17H9"/><path d="M18 14v-3a6 6 0 0 0-12 0v3l-2 3h16l-2-3Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg></div></header>
  <nav class="tabs" id="tabs"><button class="tab active" data-filter="all">הכל</button><button class="tab" data-filter="בארץ">חדשות בארץ</button><button class="tab" data-filter="עולם">עולם</button><button class="tab" data-filter="כלכלה">כלכלה</button><button class="tab" data-filter="טכנולוגיה">טכנולוגיה</button><button class="tab" data-filter="ספורט">ספורט</button></nav>
  <button class="updates" id="refreshBtn"><div class="spark">✧</div><div id="updatedAt">3 עדכונים חדשים מאז הפעם האחרונה</div><div class="chev">⌄</div></button>
  <section class="feed" id="feedCards"></section>
  <div id="emptyState" class="empty hidden">אין אייטמים בקטגוריה הזו כרגע</div>
  <nav class="nav">
    <div class="navitem"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.5 3.5-8 8-8s8 3.5 8 8"/></svg><span>פרופיל</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24"><path d="M6 4h12v17l-6-4-6 4V4Z"/></svg><span>שמור</span></div>
    <div class="navitem active"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V21h-6v-6H9v6H3v-9.5Z"/></svg><span>בית</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.4-4.4"/></svg><span>חיפוש</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg><span>עוד</span></div>
  </nav>
  <div class="homebar"></div>
</section>
</main>
<script>
const POANTA_FEED_VERSION = '20260517-heebo-typography-v1';
const embeddedFeed = {"updatedAt":"2026-05-11T21:20:00+03:00","items":[{"category":"ביטחון","source":"ynet","sourceLogo":"ynet","sourceUrl":"https://www.ynet.co.il/news/article/r1smty11ml","imageUrl":"","headline":"ראש המוסד מזהיר שמינוי גופמן מסוכן לארגון","originalTitle":"\"סכנה חמורה\": המסמך המלא, התקדימי והחריף של ראש המוסד נגד מחליפו המיועד","context":"דדי ברנע העביר לבג״ץ חוות דעת חריפה נגד מינוי רומן גופמן לראשות המוסד, ומתמקד בהתנהלותו בפרשת הנער אלמקייס.","takeaway":"הסיפור הוא לא רק מי יעמוד בראש המוסד — אלא האם מינוי ביטחוני בכיר יכול לעבור למרות אזהרה פנימית חריגה."}]};
const host = document.getElementById('feedCards');
const updatedAt = document.getElementById('updatedAt');
const emptyState = document.getElementById('emptyState');
let currentFeed = embeddedFeed;
let activeFilter = 'all';
function esc(value){ return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function topicFor(item){ const c=String(item.category||'חדשות'); if(c==='פוליטיקה'||c==='ביטחון') return 'בארץ'; return c; }
function timeFor(index){ const now=new Date(); now.setMinutes(now.getMinutes()-index*47); return now.toLocaleTimeString('he-IL',{hour:'numeric',minute:'2-digit'}); }
function sourceName(item){ return String(item.source || item.sourceLogo || 'מקור'); }
function sourceClass(item){ const s=sourceName(item).toLowerCase(); if(s.includes('ynet'))return'ynet'; if(s.includes('marker'))return'marker'; if(s.includes('tech'))return'tech'; if(s.includes('וואלה')||s.includes('walla'))return'walla'; if(s.includes('n12')||s.includes('mako'))return'n12'; if(s.includes('ישראל'))return'israel'; return'other'; }
function sourceLogoText(item){ const s=sourceName(item); if(s.toLowerCase().includes('ynet')) return 'y'; if(s.toLowerCase().includes('marker')) return 'The<br>Marker'; if(s.toLowerCase().includes('tech')) return 'TECH'; if(s.toLowerCase().includes('n12')) return 'N12'; return esc(s.split(' ')[0].slice(0,4)); }
function imgHtml(item){ if(item.imageUrl) return `<img class="img" src="${esc(item.imageUrl)}" alt="">`; return `<div class="img placeholder">P</div>`; }
function story(item,index){ const topic=topicFor(item); const cls=sourceClass(item); const href=esc(item.sourceUrl||'#'); return `<article class="card" data-category="${esc(item.category||'חדשות')}"><div class="inner"><div class="meta"><div class="cat"><span class="dot"></span><span>${esc(topic)}</span></div><div>${timeFor(index)}</div></div><div class="content"><div class="txt"><h2>${esc(item.headline)}</h2><p class="summary">${esc(item.context||'')}</p><div class="insight">${esc(item.takeaway||'הפואנטה בקצרה.')} <span>💡</span></div></div><a href="${href}" target="_blank" rel="noopener">${imgHtml(item)}</a></div><a class="source" href="${href}" target="_blank" rel="noopener"><div class="slogo"><span class="sym ${cls}">${sourceLogoText(item)}</span><span>${esc(sourceName(item))}</span></div><div class="orig">${esc(item.originalTitle||item.headline)}</div><div class="arrow">›</div></a></div></article>`; }
function visibleItems(){ const items=(currentFeed&&Array.isArray(currentFeed.items))?currentFeed.items:[]; if(activeFilter==='all') return items; return items.filter(i => topicFor(i)===activeFilter || i.category===activeFilter); }
function render(feed){ currentFeed=feed||embeddedFeed; const items=visibleItems(); host.innerHTML=items.map(story).join(''); emptyState.classList.toggle('hidden',items.length>0); if(currentFeed.updatedAt){ try{updatedAt.textContent='3 עדכונים חדשים מאז הפעם האחרונה';}catch{} } }
document.getElementById('tabs').addEventListener('click',ev=>{ const btn=ev.target.closest('.tab'); if(!btn) return; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); activeFilter=btn.dataset.filter||'all'; render(currentFeed); });
document.getElementById('refreshBtn').addEventListener('click',()=>fetchFeed(true));
function fetchFeed(force=false){ const v=force?Date.now():POANTA_FEED_VERSION; return fetch('feed.json?v='+encodeURIComponent(v),{cache:'reload'}).then(r=>r.ok?r.json():embeddedFeed).then(render).catch(()=>render(embeddedFeed)); }
fetchFeed();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>null);
</script>
</body>
</html>
