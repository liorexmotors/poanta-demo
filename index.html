<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#061014">
<title>Pointa</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@500;600;700;800;900&family=Inter:wght@500;600;700;800;900&display=swap');
:root{
  --bg:#071015;
  --card:#0B151A;
  --text:#F6F7F8;
  --secondary:rgba(255,255,255,.72);
  --muted:rgba(255,255,255,.45);
  --faint:rgba(255,255,255,.05);
  --yellow:#FFC400;
  --yellow-soft:#E9B400;
  --nav:rgba(10,15,20,.9);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#020608;color:var(--text);font-family:"Heebo",Arial,sans-serif;text-rendering:geometricPrecision;-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center;padding:18px}
a{color:inherit;text-decoration:none}button{font:inherit;color:inherit;background:none;border:0;padding:0}
.phone{width:430px;max-width:100%;min-height:932px;border-radius:38px;overflow:hidden;position:relative;background:linear-gradient(180deg,#081217 0%,var(--bg) 58%,#050b0f 100%);box-shadow:0 24px 70px rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.06)}
.screen{min-height:932px;padding:118px 16px 90px;position:relative}
.status{display:none}
.icons{display:flex;align-items:center;gap:7px}.signal{width:24px;height:15px;display:flex;gap:3px;align-items:flex-end}.signal span{width:4px;background:#fff;border-radius:4px}.signal span:nth-child(1){height:5px}.signal span:nth-child(2){height:8px}.signal span:nth-child(3){height:11px}.signal span:nth-child(4){height:14px}.wifi{width:21px;height:15px;position:relative;overflow:hidden}.wifi:before,.wifi:after{content:"";position:absolute;left:50%;transform:translateX(-50%);border:2.2px solid #fff;border-color:#fff transparent transparent;border-radius:999px}.wifi:before{width:22px;height:22px;top:2px}.wifi:after{width:12px;height:12px;top:8px}.battery{width:28px;height:14px;border:2px solid white;border-radius:4px;position:relative;padding:1px}.battery:after{content:"";position:absolute;right:-5px;top:3px;width:3px;height:6px;background:white;border-radius:0 2px 2px 0}.battery div{width:19px;height:8px;background:white;border-radius:2px}
.topbar{position:fixed;top:18px;left:50%;transform:translateX(-50%);width:min(430px,calc(100vw - 36px));z-index:60;padding:12px 16px 0;background:linear-gradient(180deg,rgba(7,16,21,.99),rgba(7,16,21,.94));backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04)}.header{height:44px;margin-top:0;display:flex;align-items:center;justify-content:space-between;direction:ltr}.brand{display:flex;align-items:center;gap:10px}.mark{width:38px;height:38px;background:linear-gradient(135deg,#ffd84f,#ffc400 72%);border-radius:13px 13px 13px 4px;position:relative;box-shadow:0 8px 18px rgba(255,196,0,.13)}.mark:after{content:"";position:absolute;left:0;bottom:-7px;border-top:13px solid var(--yellow);border-right:13px solid transparent}.mark i{position:absolute;right:9px;height:3px;background:#0a0d0f;border-radius:20px}.mark i:nth-child(1){top:10px;width:20px}.mark i:nth-child(2){top:18px;width:20px}.mark i:nth-child(3){top:26px;width:14px}.logo-text{font-size:30px;font-weight:900;letter-spacing:-.8px;color:#fff;line-height:1}.bell{position:relative;width:28px;height:28px;color:#fff}.bell svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.55;stroke-linecap:round;stroke-linejoin:round}.bell:after{content:"";position:absolute;top:4px;right:1px;width:7px;height:7px;background:var(--yellow);border-radius:50%}
.tabs{position:relative;margin:8px 0 0;padding:0;display:flex;align-items:flex-end;gap:18px;color:rgba(255,255,255,.55);font-size:14px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{padding-bottom:8px;position:relative;white-space:nowrap;cursor:pointer}.tab.active{color:#fff;font-weight:800}.tab.active:after{content:"";position:absolute;bottom:0;right:50%;transform:translateX(50%);height:3px;width:28px;border-radius:999px;background:var(--yellow)}
.updates{margin-top:0;height:44px;border:1px solid rgba(255,255,255,.07);border-radius:14px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:space-between;padding:0 14px;color:#F1F2F3;font-size:15px;font-weight:700;line-height:1.3;gap:10px}.updates .spark{color:var(--yellow);font-size:18px}.updates .chev{font-size:21px;margin-top:-3px;color:rgba(255,255,255,.65)}
.feed{margin-top:10px;display:flex;flex-direction:column;gap:10px}.card{border:1px solid var(--faint);border-radius:18px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.015));box-shadow:0 8px 20px rgba(0,0,0,.12)}.inner{padding:16px 16px 0}.meta{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:12px;font-weight:700;line-height:1.2;margin-bottom:8px}.cat{display:flex;align-items:center;gap:7px}.dot{width:8px;height:8px;border-radius:50%;background:var(--yellow)}
h2{margin:0 0 10px;font-size:22px;line-height:1.14;font-weight:900;letter-spacing:-.45px;color:#fff;text-align:right;overflow:visible}.headline-medium{font-size:21px;letter-spacing:-.35px}.headline-long{font-size:20px;letter-spacing:-.25px;line-height:1.15}.headline-xl{font-size:18.5px;letter-spacing:-.15px;line-height:1.16}
.content{display:grid;grid-template-columns:1fr 110px;gap:12px;align-items:stretch;min-height:88px;direction:rtl}.txt{text-align:right;min-width:0;display:flex;align-items:center}.summary{margin:0;color:var(--secondary);font-size:14.5px;line-height:1.42;font-weight:500;text-align:right;overflow:visible}.img{width:110px;aspect-ratio:1.25/1;height:auto;border-radius:14px;border:0;object-fit:cover;background:#111a20;display:block}.img.placeholder{height:88px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#152026,#0a1115);color:rgba(255,196,0,.5);font-size:30px;font-weight:900}.insight{max-width:100%;margin-top:10px;color:var(--yellow-soft);opacity:.92;font-size:14px;font-weight:800;line-height:1.25;text-align:right;display:flex;align-items:flex-start;gap:6px;white-space:normal;overflow:visible;direction:rtl}.insight .bulb{font-size:15px;line-height:1;flex:0 0 auto}.insight .insight-text{white-space:normal;overflow:visible}
.source{margin-top:10px;border-top:1px solid var(--faint);min-height:46px;padding:8px 0;display:grid;grid-template-columns:28px 1fr 14px;align-items:start;gap:8px;direction:rtl}.slogo{display:flex;align-items:center;justify-content:center;min-width:0}.sym{width:28px;height:28px;flex:0 0 28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);overflow:hidden}.sym img{width:100%;height:100%;object-fit:cover}.orig{color:rgba(255,255,255,.52);font-size:12.5px;line-height:1.32;text-align:right;direction:rtl;font-weight:600;white-space:normal;overflow:visible}.source-name{color:rgba(255,255,255,.74);font-weight:800}.arrow{color:rgba(255,255,255,.68);font-size:20px;font-weight:300;line-height:1;text-align:center;padding-top:3px;transform:scaleX(-1)}
.nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(398px,calc(100vw - 32px));height:68px;background:var(--nav);border:1px solid var(--faint);border-radius:16px;display:grid;grid-template-columns:repeat(5,1fr);backdrop-filter:blur(16px);z-index:40}.navitem{display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.45);font-size:12px;font-weight:600;gap:4px}.navitem svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.navitem.active{color:var(--yellow);font-weight:800}.navitem.active svg{fill:var(--yellow);stroke:var(--yellow)}.homebar{position:fixed;left:50%;bottom:4px;transform:translateX(-50%);width:142px;height:5px;border-radius:10px;background:white;z-index:41}.empty{padding:32px 0;text-align:center;color:var(--muted);font-weight:700;font-size:14px}.hidden{display:none!important}.btn{min-height:38px;height:40px;border-radius:999px;padding:0 18px;font-size:14px;font-weight:800;line-height:1;display:inline-flex;align-items:center;justify-content:center}.btn.primary{background:var(--yellow);color:#0B0B0B}.btn.secondary{background:var(--card);color:var(--text);border:1px solid var(--faint)}.modal-title,.settings-title{margin:0;color:var(--text);font-size:21px;font-weight:900;line-height:1.2}.settings-body{color:var(--muted);font-size:14px;font-weight:500;line-height:1.45}
@media(max-width:480px){body{padding:0;background:var(--bg)}.phone{width:100%;min-height:100vh;border-radius:0;border:none}.screen{min-height:100vh;padding-top:116px}.topbar{top:0;width:100%;padding-top:12px}}
@media(max-width:390px){.screen{padding-inline:16px;padding-top:114px}.tabs{gap:18px}.content{grid-template-columns:1fr 104px;gap:12px}.img{width:104px}.img.placeholder{height:83px}h2{font-size:21px}.headline-medium{font-size:20px}.headline-long{font-size:19px}.headline-xl{font-size:18px}.summary{font-size:14px}.updates{font-size:14.5px}}
@media(min-width:720px){.logo-text{font-size:38px}.phone{width:520px}.screen{padding-left:20px;padding-right:20px}h2{font-size:26px}.headline-medium{font-size:24px}.headline-long{font-size:23px}.headline-xl{font-size:21px}.content{grid-template-columns:1fr 124px}.img{width:124px}.img.placeholder{height:99px}}
</style>
</head>
<body>
<main class="phone">
<section class="screen">
  <div class="topbar"><header class="header"><div class="brand"><div class="mark"><i></i><i></i><i></i></div><div class="logo-text">Pointa</div></div><div class="bell"><svg viewBox="0 0 24 24"><path d="M15 17H9"/><path d="M18 14v-3a6 6 0 0 0-12 0v3l-2 3h16l-2-3Z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg></div></header>
  <nav class="tabs" id="tabs"><button class="tab active" data-filter="all">הכל</button><button class="tab" data-filter="בארץ">חדשות בארץ</button><button class="tab" data-filter="עולם">עולם</button><button class="tab" data-filter="כלכלה">כלכלה</button><button class="tab" data-filter="טכנולוגיה">טכנולוגיה</button><button class="tab" data-filter="ספורט">ספורט</button></nav></div>
  <button class="updates" id="refreshBtn"><div class="spark">✧</div><div id="updatedAt">3 עדכונים חדשים מאז הפעם האחרונה</div><div class="chev">⌄</div></button>
  <section class="feed" id="feedCards"></section>
  <div id="emptyState" class="empty hidden">אין אייטמים בקטגוריה הזו כרגע</div>
  <nav class="nav">
    <div class="navitem"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.5 3.5-8 8-8s8 3.5 8 8"/></svg><span>פרופיל</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24"><path d="M6 4h12v17l-6-4-6 4V4Z"/></svg><span>שמור</span></div>
    <div class="navitem active"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5V21h-6v-6H9v6H3v-9.5Z"/></svg><span>בית</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.4-4.4"/></svg><span>חיפוש</span></div>
    <div class="navitem"><svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg><span>עוד</span></div>
  </nav>
  <div class="homebar"></div>
</section>
</main>
<script>
const POANTA_FEED_VERSION = '20260517-security-insurance-v1';
const embeddedFeed = {"updatedAt":"2026-05-11T21:20:00+03:00","items":[{"category":"ביטחון","source":"ynet","sourceLogo":"ynet","sourceUrl":"https://www.ynet.co.il/news/article/r1smty11ml","imageUrl":"","headline":"ראש המוסד מזהיר שמינוי גופמן מסוכן לארגון","originalTitle":"\"סכנה חמורה\": המסמך המלא, התקדימי והחריף של ראש המוסד נגד מחליפו המיועד","context":"דדי ברנע העביר לבג״ץ חוות דעת חריפה נגד מינוי רומן גופמן לראשות המוסד, ומתמקד בהתנהלותו בפרשת הנער אלמקייס.","takeaway":"הסיפור הוא לא רק מי יעמוד בראש המוסד — אלא האם מינוי ביטחוני בכיר יכול לעבור למרות אזהרה פנימית חריגה."}]};
const host = document.getElementById('feedCards');
const updatedAt = document.getElementById('updatedAt');
const emptyState = document.getElementById('emptyState');
let currentFeed = embeddedFeed;
let activeFilter = 'all';
function esc(value){ return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function topicFor(item){ const c=String(item.category||'חדשות'); if(c==='פוליטיקה'||c==='ביטחון') return 'בארץ'; return c; }
function timeFor(index){ const now=new Date(); now.setMinutes(now.getMinutes()-index*47); return now.toLocaleTimeString('he-IL',{hour:'numeric',minute:'2-digit'}); }
function sourceName(item){ return String(item.source || item.sourceLogo || 'מקור'); }
function sourceClass(item){ const s=sourceName(item).toLowerCase(); if(s.includes('ynet'))return'ynet'; if(s.includes('marker'))return'marker'; if(s.includes('tech'))return'tech'; if(s.includes('וואלה')||s.includes('walla'))return'walla'; if(s.includes('n12')||s.includes('mako'))return'n12'; if(s.includes('ישראל'))return'israel'; return'other'; }
function faviconUrl(item){ try{ const host=new URL(item.sourceUrl||'', location.href).hostname; return host ? `https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=64` : ''; }catch{return '';} }
function sourceLogoHtml(item){ const icon=faviconUrl(item); return icon ? `<img src="${esc(icon)}" alt="">` : esc(sourceName(item).trim().slice(0,1)||'P'); }
function imgHtml(item){ if(item.imageUrl) return `<img class="img" src="${esc(item.imageUrl)}" alt="">`; return `<div class="img placeholder">P</div>`; }
function headlineClass(text){ const n=String(text||'').length; if(n>78)return'headline-xl'; if(n>58)return'headline-long'; if(n>42)return'headline-medium'; return''; }
function displayHeadline(item){ const h=String(item.headline||'').trim(); const o=String(item.originalTitle||'').trim().replace(/[?؟]+$/,''); if(/הפואנטה היא|הכותרת הכלכלית|הסיפור הנדלני|הפרסום הצרכני|החידוש הטכנולוגי|האירוע הביטחוני|מאחורי הכותרת/.test(h) && o) return o; return h || o || 'עדכון חדש בפואנטה'; }
function summaryFor(item){ const raw=String(item.context||'').trim().replace(/…|\.\.\./g,''); if(!raw) return 'המשמעות המעשית חשובה יותר מניסוח הכותרת.'; if(/פרסם ידיעה בנושא|פורסם|כתבה בנושא|דיווח/.test(raw)) return 'הסיפור חשוב בגלל ההשפעה המעשית שלו, לא בגלל ניסוח המקור.'; return raw; }
function compactInsight(text){ return String(text||'הפואנטה בקצרה.').replace(/^💡\s*/,'').trim(); }
function story(item,index){ const topic=topicFor(item); const cls=sourceClass(item); const href=esc(item.sourceUrl||'#'); const title=displayHeadline(item); const hcls=headlineClass(title); return `<article class="card" data-category="${esc(item.category||'חדשות')}"><div class="inner"><div class="meta"><div class="cat"><span class="dot"></span><span>${esc(topic)}</span></div><div>${timeFor(index)}</div></div><h2 class="${hcls}">${esc(title)}</h2><div class="content"><div class="txt"><p class="summary">${esc(summaryFor(item))}</p></div><a href="${href}" target="_blank" rel="noopener">${imgHtml(item)}</a></div><div class="insight"><span class="bulb">💡</span><span class="insight-text">${esc(compactInsight(item.takeaway))}</span></div><a class="source" href="${href}" target="_blank" rel="noopener"><div class="slogo"><span class="sym ${cls}">${sourceLogoHtml(item)}</span></div><div class="orig"><span class="source-name">${esc(sourceName(item))}: </span>${esc(item.originalTitle||item.headline)}</div><div class="arrow">›</div></a></div></article>`; }
function visibleItems(){ const items=(currentFeed&&Array.isArray(currentFeed.items))?currentFeed.items:[]; if(activeFilter==='all') return items; return items.filter(i => topicFor(i)===activeFilter || i.category===activeFilter); }
function render(feed){ currentFeed=feed||embeddedFeed; const items=visibleItems(); host.innerHTML=items.map(story).join(''); emptyState.classList.toggle('hidden',items.length>0); if(currentFeed.updatedAt){ try{updatedAt.textContent='3 עדכונים חדשים מאז הפעם האחרונה';}catch{} } }
document.getElementById('tabs').addEventListener('click',ev=>{ const btn=ev.target.closest('.tab'); if(!btn) return; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); activeFilter=btn.dataset.filter||'all'; render(currentFeed); });
document.getElementById('refreshBtn').addEventListener('click',()=>fetchFeed(true));
function fetchFeed(force=false){ const v=force?Date.now():POANTA_FEED_VERSION; return fetch('feed.json?v='+encodeURIComponent(v),{cache:'reload'}).then(r=>r.ok?r.json():embeddedFeed).then(render).catch(()=>render(embeddedFeed)); }
fetchFeed();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>null);
</script>
</body>
</html>
