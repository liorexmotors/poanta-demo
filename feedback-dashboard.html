<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poanta · דשבורד סימונים</title>
  <style>
    :root{--bg:#071015;--panel:#0d171d;--panel2:#101f27;--text:#f4f7f8;--muted:#9fb0b8;--yellow:#ffc400;--red:#ff6b6b;--green:#52d273;--line:rgba(255,255,255,.09);--shadow:0 18px 45px rgba(0,0,0,.28)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#14252e 0,#071015 42%,#050b0f 100%);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;min-height:100vh}.wrap{width:min(1180px,100%);margin:0 auto;padding:24px 16px 42px}.top{display:flex;gap:14px;align-items:flex-end;justify-content:space-between;margin-bottom:18px}.kicker{color:var(--yellow);font-weight:950;font-size:13px;letter-spacing:.02em}h1{margin:4px 0 0;font-size:clamp(28px,5vw,46px);line-height:1.05}.sub{margin:8px 0 0;color:var(--muted);font-weight:700}.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-start}.input,.btn,select{height:42px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);font:inherit;font-weight:800;padding:0 12px}.input{min-width:min(360px,100%);direction:ltr;text-align:left}.btn{cursor:pointer;background:rgba(255,196,0,.12);border-color:rgba(255,196,0,.28)}.btn:hover{background:rgba(255,196,0,.18)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}.stat,.panel{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.028));border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}.stat{padding:16px}.stat .label{color:var(--muted);font-size:13px;font-weight:850}.stat .num{font-size:34px;font-weight:950;margin-top:5px}.stat.down .num{color:var(--red)}.stat.up .num{color:var(--green)}.stat.ratio .num{color:var(--yellow)}.layout{display:grid;grid-template-columns:1.35fr .9fr;gap:12px}.panel{padding:16px;min-width:0}.panel h2{font-size:18px;margin:0 0 12px}.empty{color:var(--muted);font-weight:750;padding:12px;border:1px dashed var(--line);border-radius:16px}.card-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:13px 0;border-top:1px solid var(--line)}.card-row:first-of-type{border-top:0}.rank{width:32px;height:32px;border-radius:999px;background:rgba(255,196,0,.12);display:flex;align-items:center;justify-content:center;color:var(--yellow);font-weight:950}.headline{font-weight:950;line-height:1.25}.meta{margin-top:5px;color:var(--muted);font-size:12px;font-weight:750}.score{text-align:left;direction:ltr;white-space:nowrap;font-weight:950}.bad{color:var(--red)}.good{color:var(--green)}.bar-row{display:grid;grid-template-columns:115px 1fr 58px;gap:10px;align-items:center;margin:10px 0}.bar-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-weight:800}.bar{height:13px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--red),#ffb15c)}.event{padding:10px 0;border-top:1px solid var(--line)}.event:first-of-type{border-top:0}.event .emoji{font-size:18px;margin-left:4px}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 9px;color:var(--muted);font-size:12px;font-weight:850}.status{margin-top:14px}.status.error{color:var(--red)}.status.ok{color:var(--green)}a{color:inherit}.setup{background:rgba(255,196,0,.08);border-color:rgba(255,196,0,.25)}code{direction:ltr;unicode-bidi:bidi-override;background:rgba(0,0,0,.22);padding:2px 5px;border-radius:7px;color:var(--yellow)}@media(max-width:850px){.top,.layout{display:block}.controls{margin-top:14px}.grid{grid-template-columns:repeat(2,1fr)}.panel{margin-bottom:12px}.bar-row{grid-template-columns:90px 1fr 52px}.card-row{grid-template-columns:auto 1fr}.score{grid-column:2;text-align:right}.input{width:100%;min-width:0}}  
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div>
        <div class="kicker">POANTA OPS</div>
        <h1>דשבורד סימוני מודעות</h1>
        <p class="sub">חיווי חי על 👍👎 בכרטיסים: מה דורש עורך, איזה מקור מצטבר כבעייתי, ומה סומן עכשיו.</p>
      </div>
      <div class="controls">
        <input id="apiBase" class="input" placeholder="https://api.example.com" aria-label="API base URL">
        <select id="hours"><option value="6">6 שעות</option><option value="24" selected>24 שעות</option><option value="72">72 שעות</option><option value="168">7 ימים</option></select>
        <button class="btn" id="refresh">רענון</button>
      </div>
    </section>

    <section class="grid">
      <div class="stat up"><div class="label">סימונים חיוביים</div><div class="num" id="upCount">—</div></div>
      <div class="stat down"><div class="label">סימונים שליליים</div><div class="num" id="downCount">—</div></div>
      <div class="stat"><div class="label">כרטיסים לבדיקה</div><div class="num" id="actionCount">—</div></div>
      <div class="stat ratio"><div class="label">יחס שלילי</div><div class="num" id="downRatio">—</div></div>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>דורש טיפול</h2>
        <div id="actionItems" class="empty">טוען…</div>
      </div>
      <div>
        <div class="panel">
          <h2>מקורות עם סימון שלילי</h2>
          <div id="sources" class="empty">טוען…</div>
        </div>
        <div class="panel">
          <h2>קטגוריות</h2>
          <div id="categories" class="empty">טוען…</div>
        </div>
      </div>
    </section>

    <section class="panel" style="margin-top:12px">
      <h2>סימונים אחרונים</h2>
      <div id="recent" class="empty">טוען…</div>
    </section>

    <section id="status" class="status"></section>
  </main>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const params=new URLSearchParams(location.search);
const stored=localStorage.getItem('pointa:feedback-api-url')||'';
$('#apiBase').value=params.get('api')||stored||'';
function endpoint(){const base=$('#apiBase').value.trim().replace(/\/$/,'');return base?`${base}/v1/feedback/report?hours=${$('#hours').value}&limit=30`:`/v1/feedback/report?hours=${$('#hours').value}&limit=30`;}
function counts(rows){const out={up:0,down:0,clear:0};(rows||[]).forEach(r=>{out[r.feedback]=(out[r.feedback]||0)+Number(r.count||0)});return out;}
function grouped(rows,key){const m={};(rows||[]).forEach(r=>{const name=r[key]||r.name||'unknown';m[name]=m[name]||{name,up:0,down:0,clear:0};m[name][r.feedback]=(m[name][r.feedback]||0)+Number(r.count||0)});return Object.values(m).map(x=>({...x,total:x.up+x.down+x.clear,ratio:(x.down/(x.up+x.down||1))})).sort((a,b)=>b.down-a.down||b.ratio-a.ratio||a.name.localeCompare(b.name));}
function setEmpty(id,text){$(id).className='empty';$(id).innerHTML=esc(text)}
function renderBars(id,items){if(!items.length)return setEmpty(id,'אין נתונים עדיין');const max=Math.max(...items.map(x=>x.down),1);$(id).className='';$(id).innerHTML=items.slice(0,8).map(x=>`<div class="bar-row"><div class="bar-label" title="${esc(x.name)}">${esc(x.name)}</div><div class="bar"><div class="fill" style="width:${Math.round((x.down/max)*100)}%"></div></div><div class="score bad">👎 ${x.down}</div></div>`).join('');}
function render(data){const c=counts(data.totals);const total=c.up+c.down;$('#upCount').textContent=c.up;$('#downCount').textContent=c.down;$('#actionCount').textContent=(data.actionItems||[]).length;$('#downRatio').textContent=total?Math.round(c.down/total*100)+'%':'0%';
 const actions=data.actionItems||[]; if(!actions.length)setEmpty('#actionItems','אין כרטיסים שסומנו לשלילה ודורשים טיפול כרגע.'); else {$('#actionItems').className='';$('#actionItems').innerHTML=actions.map((x,i)=>`<div class="card-row"><div class="rank">${i+1}</div><div><div class="headline">${esc(x.headline||'ללא כותרת')}</div><div class="meta">${esc(x.source||'מקור לא ידוע')} · בעלים: ${esc(x.owner||'')}</div>${x.sourceUrl?`<div class="meta"><a href="${esc(x.sourceUrl)}" target="_blank" rel="noopener">מקור</a></div>`:''}</div><div class="score"><span class="bad">👎 ${x.down||0}</span> / <span class="good">👍 ${x.up||0}</span><br><span class="pill">${Math.round((x.downRatio||0)*100)}% שלילי</span></div></div>`).join('')}
 renderBars('#sources',grouped(data.bySource,'source_name')); renderBars('#categories',grouped(data.byCategory,'category'));
 const recent=data.recentEvents||[]; if(!recent.length)setEmpty('#recent','אין סימונים אחרונים'); else {$('#recent').className='';$('#recent').innerHTML=recent.slice(0,12).map(ev=>`<div class="event"><span class="emoji">${ev.feedback==='up'?'👍':ev.feedback==='down'?'👎':'↩️'}</span><strong>${esc(ev.headline||ev.card_key||'ללא כותרת')}</strong><div class="meta">${esc(ev.source_name||'')} · ${esc(ev.category||'')} · ${esc(ev.received_at||'')}</div></div>`).join('')}
 $('#status').className='status ok'; $('#status').innerHTML=`עודכן: ${esc(data.createdAt||new Date().toISOString())} · חלון: ${esc(data.windowHours)} שעות`;
}
async function load(){const base=$('#apiBase').value.trim(); if(base)localStorage.setItem('pointa:feedback-api-url',base); $('#status').className='status'; $('#status').textContent='טוען דוח…'; try{const r=await fetch(endpoint(),{cache:'no-store'}); const data=await r.json(); if(data.status==='unavailable'||data.ok===false){throw new Error(data.reason||'feedback report unavailable')} render(data);}catch(e){$('#upCount').textContent='—';$('#downCount').textContent='—';$('#actionCount').textContent='—';$('#downRatio').textContent='—';setEmpty('#actionItems','אין חיבור לדוח סימונים עדיין');setEmpty('#sources','אין נתונים');setEmpty('#categories','אין נתונים');setEmpty('#recent','אין נתונים');$('#status').className='status error panel setup';$('#status').innerHTML=`<strong>הדשבורד מוכן, אבל אין עדיין חיבור API/DB פעיל.</strong><br>הגדר API Base שמשרת <code>/v1/feedback/report</code>, או פתח עם <code>?api=https://...</code>.<br><span class="meta">שגיאה: ${esc(e.message)}</span>`;}}
$('#refresh').addEventListener('click',load);$('#hours').addEventListener('change',load);load();setInterval(load,5*60*1000);
</script>
</body>
</html>
