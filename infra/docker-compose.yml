services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: poanta
      POSTGRES_USER: poanta
      POSTGRES_PASSWORD: poanta_dev
    ports:
      - "54329:5432"
    volumes:
      - poanta_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "63799:6379"

  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "pip install -r services/api/requirements.txt && uvicorn services.api.app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

volumes:
  poanta_pg:
