<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poenta · מסך RSS</title>
  <link rel="icon" href="./favicon.ico" sizes="32x32">
  <style>
    :root{--bg:#071015;--card:#0d171d;--text:#F4F6F7;--muted:rgba(255,255,255,.52);--secondary:rgba(255,255,255,.72);--faint:rgba(255,255,255,.075);--yellow:#FFC400;--red:#ff6b6b;--green:#52d273;--blue:#7fc8ff;--shadow:0 24px 70px rgba(0,0,0,.42)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020608;color:var(--text);font-family:"Heebo",Arial,sans-serif;-webkit-font-smoothing:antialiased}body{padding:18px}a{color:inherit}.wrap{width:100%;min-height:calc(100vh - 36px);border-radius:30px;background:linear-gradient(180deg,#081217 0%,var(--bg) 58%,#050b0f 100%);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.06);padding:18px;overflow:hidden}.top{position:sticky;top:0;z-index:10;margin:-18px -18px 14px;padding:14px 18px;background:#071015;border-bottom:1px solid rgba(255,255,255,.07);box-shadow:0 10px 22px rgba(0,0,0,.34)}.brandline{height:42px;display:flex;align-items:center;justify-content:space-between;direction:ltr}.brand-logo{height:38px;width:auto;display:block}.kicker{display:inline-flex;align-items:center;border:1px solid rgba(255,196,0,.20);border-radius:999px;background:rgba(255,196,0,.08);color:var(--yellow);font-size:10.5px;font-weight:950;line-height:1;padding:6px 9px;letter-spacing:.02em}h1{margin:12px 0 0;font-size:30px;line-height:1.05;font-weight:950;letter-spacing:-.6px}.sub{margin:7px 0 0;color:var(--muted);font-size:14px;font-weight:750}.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin:14px 0}.toolbar label{display:flex;flex-direction:column;gap:5px;color:var(--muted);font-size:11px;font-weight:950}.toolbar select,.btn{height:36px;border-radius:999px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:rgba(255,255,255,.78);font:inherit;font-size:12px;font-weight:900;padding:0 12px;min-width:168px}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;min-width:auto;background:var(--yellow);border-color:var(--yellow);color:#071015;cursor:pointer}.count{margin-inline-start:auto;color:var(--secondary);font-size:13px;font-weight:950;padding-bottom:10px}.panel{border:1px solid var(--faint);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.015))}.table-wrap{height:calc(100vh - 225px);min-height:520px;overflow:auto}.table{width:100%;min-width:1120px;border-collapse:separate;border-spacing:0}.table th{position:sticky;top:0;z-index:2;background:#0b151a;color:rgba(255,255,255,.48);font-size:11px;font-weight:950;text-align:right;padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08)}.table td{font-size:12.5px;font-weight:760;line-height:1.38;padding:10px 8px;border-top:1px solid rgba(255,255,255,.06);vertical-align:top}.table tbody tr:hover{background:rgba(255,255,255,.025)}.meta{color:var(--muted);font-weight:700;font-size:11.5px;margin-top:4px}.pill{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.09);border-radius:999px;padding:5px 8px;font-size:11px;font-weight:950;white-space:nowrap}.pill.ok{color:var(--green);border-color:rgba(82,210,115,.35);background:rgba(82,210,115,.08)}.pill.warn{color:var(--yellow);border-color:rgba(255,196,0,.34);background:rgba(255,196,0,.08)}.pill.fail{color:var(--red);border-color:rgba(255,107,107,.36);background:rgba(255,107,107,.08)}.rss-url{direction:ltr;text-align:left;max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title{max-width:360px}.empty{margin:14px;color:var(--muted);font-weight:850;border:1px dashed rgba(255,255,255,.10);border-radius:16px;padding:14px}.status{color:var(--muted);font-size:12px;font-weight:800;margin-top:10px}.brand-logo-light{display:none}@media(prefers-color-scheme:light){.brand-logo-dark{display:none}.brand-logo-light{display:block}}@media(max-width:700px){body{padding:0}.wrap{border-radius:0;min-height:100vh}.table-wrap{height:calc(100vh - 260px);min-height:420px}.count{width:100%;padding-bottom:0}.toolbar select{min-width:150px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="brandline"><div><img class="brand-logo brand-logo-dark" src="./assets/poenta-logo.png" alt="Poenta"><img class="brand-logo brand-logo-light" src="./assets/poenta-logo-light.png" alt="Poenta"></div><div class="kicker">RSS CONTROL</div></div>
      <h1>מסך RSS מלא</h1>
      <p class="sub">כל מקורות ה־RSS הפעילים בהגדרות. ברירת המחדל: הטרי ביותר ראשון. מוצגות עד 100 רשומות בתצוגה נגללת אחת.</p>
      <div class="toolbar">
        <label>מקור<select id="sourceFilter"><option value="all">כל המקורות</option></select></label>
        <label>תחום<select id="domainFilter"><option value="all">כל התחומים</option></select></label>
        <label>מיון<select id="sortBy"><option value="fresh_desc">הטרי ביותר ראשון</option><option value="source_asc">מקור א-ת</option><option value="domain_asc">תחום א-ת</option><option value="name_asc">שם RSS א-ת</option><option value="items_desc">כמות פריטים מאומתים</option></select></label>
        <button class="btn" id="refresh">רענון</button>
        <a class="btn" href="feedback-dashboard.html">חזרה לדשבורד</a>
        <div class="count" id="count">—</div>
      </div>
    </section>
    <section class="panel"><div id="table" class="table-wrap"><div class="empty">טוען RSS…</div></div></section>
    <div class="status" id="status"></div>
  </main>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const THRESHOLDS={"ביטחון":[15,25],"פוליטיקה":[20,30],"אקטואליה בעולם":[45,60],"משפט":[30,45],"פלילים":[25,40],"כלכלה":[30,45],"צרכנות":[45,60],"טכנולוגיה":[60,90],"בריאות":[60,90],"תרבות":[90,120],"רכילות":[90,120],"ספורט":[45,60],"נדל״ן":[90,120],"דעות":[60,90],"חדשות":[25,35],"רכב":[45,60],"מזג אוויר":[120,180],"מקורות זרים":[45,60]};
let feedData=null,catalog=[];
function parseDate(x){if(!x)return null;const d=new Date(x);return Number.isNaN(d.getTime())?null:d}
function minAge(d){return d?Math.max(0,Math.floor((Date.now()-d.getTime())/60000)):null}
function fmtAge(m){if(m==null)return '—';if(m<1)return 'עכשיו';if(m<60)return `${m} דק׳`;const h=Math.floor(m/60),r=m%60;return r?`${h} ש׳ ${r} דק׳`:`${h} ש׳`}
function fmtTime(d){return d?new Intl.DateTimeFormat('he-IL',{timeZone:'Asia/Jerusalem',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d):'—'}
function statusFor(age,thr){if(age==null)return 'fail';if(age<=thr[0])return 'ok';if(age<=thr[1])return 'warn';return 'fail'}
function statusText(s){return s==='ok'?'תקין':s==='warn'?'אזהרה':'אדום'}
function reason(r){if(r.age==null)return 'אין פעילות RSS תקפה למדידה';if(r.age>r.thr[1])return `עברו ${fmtAge(r.age)} — מעל סף אדום ${r.thr[1]} דק׳`;if(r.age>r.thr[0])return `עברו ${fmtAge(r.age)} — מעל סף ירוק ${r.thr[0]} דק׳`;return `בתוך הטווח התקין (${r.thr[0]} דק׳)`}
function normKey(s){return String(s||'').toLowerCase().replace(/[\s\-–—־_״"'׳:|()\[\].,]+/g,' ').trim()}
function canonicalSource(name){const s=String(name||''),low=s.toLowerCase();if(low.includes('cnn'))return 'CNN';if(low.includes('bbc'))return 'BBC';if(low.includes('sky news')||low.includes('sky'))return 'Sky News';if(low.includes('reuters'))return 'Reuters';if(low==='ap'||low.includes('associated press'))return 'AP';if(low.includes('guardian'))return 'Guardian';if(low.includes('new york times')||low.includes('nyt'))return 'NYT';if(low.includes('axios'))return 'Axios';if(low.includes('politico'))return 'Politico';if(low.includes('bloomberg'))return 'Bloomberg';if(low.includes('al jazeera'))return 'Al Jazeera';if(low.includes('jerusalem post')||low.includes('jpost'))return 'Jerusalem Post';if(s.includes('וואלה')||low.includes('walla'))return 'וואלה';if(low.includes('ynet'))return 'ynet';if(s.includes('גלובס'))return 'גלובס';if(s.includes('הארץ')||low.includes('haaretz'))return 'הארץ';if(s.includes('ישראל היום'))return 'ישראל היום';if(s.includes('מעריב')||low.includes('maariv'))return 'מעריב';if(s.includes('דה מרקר')||low.includes('themarker'))return 'דה מרקר';if(s.includes('N12')||low.includes('mako'))return 'N12';return s.split(' - ')[0].trim()||'מקור'}
function activityFor(src){const acts=feedData?.sourceActivity||[];const name=normKey(src.name),logo=normKey(src.logo),cat=normKey(src.categoryHint);let candidates=acts.filter(a=>normKey(a.subSource)===name||normKey(a.source)===name);if(!candidates.length&&logo)candidates=acts.filter(a=>normKey(a.source)===logo&&(!cat||normKey(a.category)===cat));if(!candidates.length&&logo)candidates=acts.filter(a=>normKey(a.source)===logo);let best=null;for(const a of candidates){const d=parseDate(a.publishedAt);if(d&&(!best||d>best.date))best={date:d,item:a};}return best}
function rows(){return (catalog||[]).filter(src=>src.rss).map((src,idx)=>{const act=activityFor(src),domain=src.categoryHint||'חדשות',age=act?minAge(act.date):null,thr=THRESHOLDS[domain]||THRESHOLDS['חדשות'],st=statusFor(age,thr);return {idx,name:src.name||'RSS',source:src.logo||canonicalSource(src.name),domain,url:src.rss,items:Number(src.lastValidatedItems||0),latest:act?.date||null,age,thr,st,title:act?.item?.title||act?.item?.headline||'',sourceUrl:act?.item?.url||''}})}
function fill(sel,values,label){const old=sel.value||'all';sel.innerHTML=`<option value="all">${label}</option>`+values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');sel.value=values.includes(old)?old:'all'}
function render(){const all=rows();fill($('#sourceFilter'),[...new Set(all.map(r=>r.source))].sort((a,b)=>a.localeCompare(b,'he')),'כל המקורות');fill($('#domainFilter'),[...new Set(all.map(r=>r.domain))].sort((a,b)=>a.localeCompare(b,'he')),'כל התחומים');const src=$('#sourceFilter').value,dom=$('#domainFilter').value,sort=$('#sortBy').value;let filtered=all.filter(r=>(src==='all'||r.source===src)&&(dom==='all'||r.domain===dom));const byText=(a,b)=>a.localeCompare(b,'he');filtered.sort((a,b)=>{if(sort==='source_asc')return byText(a.source,b.source)||byText(a.domain,b.domain)||byText(a.name,b.name);if(sort==='domain_asc')return byText(a.domain,b.domain)||byText(a.source,b.source)||byText(a.name,b.name);if(sort==='name_asc')return byText(a.name,b.name);if(sort==='items_desc')return b.items-a.items||byText(a.source,b.source);return (b.latest?b.latest.getTime():0)-(a.latest?a.latest.getTime():0)||byText(a.source,b.source)||byText(a.name,b.name)});const shown=filtered.slice(0,100);$('#count').textContent=`מוצגים ${shown.length} מתוך ${filtered.length} RSS`;if(!shown.length){$('#table').innerHTML='<div class="empty">אין RSS שתואם לסינון.</div>';return;}$('#table').innerHTML=`<table class="table"><thead><tr><th>#</th><th>מקור</th><th>תחום</th><th>שם RSS</th><th>עדכון אחרון</th><th>סטטוס</th><th>פריטים</th><th>RSS</th><th>פריט אחרון</th></tr></thead><tbody>${shown.map((r,i)=>`<tr><td>${i+1}</td><td><strong>${esc(r.source)}</strong></td><td>${esc(r.domain)}</td><td>${esc(r.name)}</td><td>${fmtAge(r.age)}<div class="meta">${fmtTime(r.latest)}</div></td><td><span class="pill ${r.st}">${statusText(r.st)}</span><div class="meta">${esc(reason(r))}</div></td><td>${r.items||'—'}</td><td class="rss-url"><a target="_blank" rel="noopener" href="rss-viewer.html?url=${encodeURIComponent(r.url)}&name=${encodeURIComponent(r.name)}">תצוגה</a> · <a target="_blank" rel="noopener" href="${esc(r.url)}">XML</a><div class="meta">${esc(r.url)}</div></td><td class="title">${r.sourceUrl?`<a target="_blank" rel="noopener" href="${esc(r.sourceUrl)}">${esc(r.title||'פתח פריט')}</a>`:esc(r.title||'—')}</td></tr>`).join('')}</tbody></table>`}
async function load(){ $('#status').textContent='טוען…'; try{const [feed,cfg]=await Promise.all([fetch('feed.json',{cache:'no-store'}).then(r=>r.json()),fetch('rss_sources.json',{cache:'no-store'}).then(r=>r.json())]);feedData=feed;catalog=Array.isArray(cfg?.active)?cfg.active:[];render();$('#status').textContent=`עודכן: ${new Date().toLocaleString('he-IL')} · סך RSS פעילים: ${catalog.filter(x=>x.rss).length}`;}catch(e){$('#table').innerHTML=`<div class="empty">שגיאה בטעינת RSS: ${esc(e.message)}</div>`;$('#status').textContent='';}}
['sourceFilter','domainFilter','sortBy'].forEach(id=>$('#'+id).addEventListener('change',render));$('#refresh').addEventListener('click',load);load();
</script>
</body>
</html>
