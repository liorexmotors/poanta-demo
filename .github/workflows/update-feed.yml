name: Update Poanta Feeds

on:
  workflow_dispatch:
  schedule:
    # Keep the public breaking feed alive. GitHub's minimum practical cadence is 5 minutes.
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: poanta-feed-update
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Update main and breaking feeds
        run: |
          python scripts/update_feed.py
          python scripts/update_breaking_feed.py
      - name: Validate feeds
        run: |
          python -m json.tool feed.json >/dev/null
          python -m json.tool breaking_feed.json >/dev/null
          python scripts/pointa_main_feed_no_breaking_guard.py --feed feed.json
      - name: Commit feed update
        run: |
          if git diff --quiet feed.json breaking_feed.json .poanta-state.json; then
            echo "No feed changes"
            exit 0
          fi
          git config user.name "poanta-feed-bot"
          git config user.email "poanta-feed-bot@users.noreply.github.com"
          git add feed.json breaking_feed.json .poanta-state.json
          git commit -m "Auto-update Poanta feeds"
          git push
