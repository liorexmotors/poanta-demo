name: Update Poanta Feeds

on:
  workflow_dispatch:
  schedule:
    # Keep the public breaking feed alive. GitHub's minimum practical cadence is 5 minutes.
    - cron: '*/5 * * * *'

permissions:
  contents: write

concurrency:
  group: poanta-feed-update
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Update main and breaking feeds
        run: |
          python scripts/update_feed.py
          python scripts/update_breaking_feed.py
      - name: Validate feeds
        run: |
          python -m json.tool feed.json >/dev/null
          python -m json.tool breaking_feed.json >/dev/null
          python scripts/pointa_main_feed_no_breaking_guard.py --feed feed.json
      - name: Commit feed update
        id: commit-feed
        run: |
          if git diff --quiet feed.json breaking_feed.json .poanta-state.json; then
            echo "No feed changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "poanta-feed-bot"
          git config user.email "poanta-feed-bot@users.noreply.github.com"
          git add feed.json breaking_feed.json .poanta-state.json
          git commit -m "Auto-update Poanta feeds"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Build static dist for public deploy
        if: steps.commit-feed.outputs.changed == 'true'
        run: npm run build
      - name: Publish breaking feed to gh-pages fallback
        if: steps.commit-feed.outputs.changed == 'true'
        run: |
          git fetch origin gh-pages
          rm -rf /tmp/poanta-gh-pages-feed
          git worktree add --detach /tmp/poanta-gh-pages-feed origin/gh-pages
          cp dist/breaking_feed.json /tmp/poanta-gh-pages-feed/breaking_feed.json
          cp dist/sw.js /tmp/poanta-gh-pages-feed/sw.js
          cp dist/_headers /tmp/poanta-gh-pages-feed/_headers
          cp dist/_redirects /tmp/poanta-gh-pages-feed/_redirects
          cd /tmp/poanta-gh-pages-feed
          if git diff --quiet breaking_feed.json sw.js _headers _redirects; then
            echo "No gh-pages breaking changes"
            exit 0
          fi
          git config user.name "poanta-feed-bot"
          git config user.email "poanta-feed-bot@users.noreply.github.com"
          git add breaking_feed.json sw.js _headers _redirects
          git commit -m "Auto-update Poanta breaking feed"
          git push origin HEAD:gh-pages
      - name: Deploy Cloudflare Pages if token is configured
        if: steps.commit-feed.outputs.changed == 'true' && env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler pages deploy dist --project-name poanta-demo --branch main
