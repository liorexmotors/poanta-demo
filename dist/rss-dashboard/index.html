<!doctype html>
<html lang="he" dir="rtl">
<head>
<base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poenta · מסך RSS</title>
  <link rel="icon" href="./favicon.ico" sizes="32x32">
  <style>
    :root{--bg:#071015;--card:#0d171d;--card2:#0b1920;--text:#F4F6F7;--muted:rgba(255,255,255,.52);--secondary:rgba(255,255,255,.72);--faint:rgba(255,255,255,.075);--yellow:#FFC400;--red:#ff6b6b;--green:#52d273;--line2:rgba(89,195,172,.24);--shadow:0 24px 70px rgba(0,0,0,.42)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020608;color:var(--text);font-family:"Heebo",Arial,sans-serif;-webkit-font-smoothing:antialiased}body{padding:18px}a{color:inherit}.wrap{width:100%;min-height:calc(100vh - 36px);border-radius:30px;background:linear-gradient(180deg,#081217 0%,var(--bg) 58%,#050b0f 100%);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.06);padding:18px;overflow:hidden}.top{position:sticky;top:0;z-index:10;margin:-18px -18px 14px;padding:14px 18px;background:rgba(7,16,21,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07);box-shadow:0 10px 22px rgba(0,0,0,.34)}.brandline{height:42px;display:flex;align-items:center;justify-content:space-between;direction:ltr}.brand-logo{height:38px;width:auto;display:block}.brand-logo-light{display:none}.kicker{display:inline-flex;align-items:center;border:1px solid rgba(255,196,0,.20);border-radius:999px;background:rgba(255,196,0,.08);color:var(--yellow);font-size:10.5px;font-weight:950;line-height:1;padding:6px 9px;letter-spacing:.02em}h1{margin:12px 0 0;font-size:30px;line-height:1.05;font-weight:950;letter-spacing:-.6px}.sub{margin:7px 0 0;color:var(--muted);font-size:14px;font-weight:750}.toolbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin:14px 0 4px}.toolbar label{display:flex;flex-direction:column;gap:5px;color:var(--muted);font-size:11px;font-weight:950}.toolbar select,.btn{height:36px;border-radius:999px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);color:rgba(255,255,255,.78);font:inherit;font-size:12px;font-weight:900;padding:0 12px;min-width:168px}.source-select{min-width:min(520px,100vw - 60px)}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;min-width:auto;background:var(--yellow);border-color:var(--yellow);color:#071015;cursor:pointer}.btn.secondary{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.10);color:#fff}.count{margin-inline-start:auto;color:var(--secondary);font-size:13px;font-weight:950;padding-bottom:10px}.panel{border:1px solid var(--faint);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01));padding:12px;margin:12px 0}.source-hero{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}.source-pill{display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:28px;margin-bottom:6px;border-radius:999px;border:1px solid rgba(81,212,132,.22);background:rgba(81,212,132,.075);color:var(--green);font-size:11px;font-weight:950}.source-name{font-size:24px;font-weight:950;line-height:1.15}.source-url{display:block;margin-top:5px;direction:ltr;text-align:right;color:var(--muted);font-size:12px;font-weight:750;overflow-wrap:anywhere}.source-meta{text-align:left;color:var(--muted);font-size:12px;font-weight:850}.source-meta strong{display:block;color:var(--secondary);font-size:13px}.status{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);color:var(--yellow)}.status.ok{color:var(--green)}.status.fail{color:var(--red)}.hint{color:var(--muted);font-size:12px;font-weight:750;line-height:1.45;margin-inline-start:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.item{min-height:138px;background:linear-gradient(180deg,rgba(14,32,40,.94),rgba(9,23,30,.96));border:1px solid var(--line2);border-radius:20px;padding:16px 18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 8px 18px rgba(0,0,0,.16)}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;color:var(--muted);font-size:12px;font-weight:950;direction:ltr;text-align:left}.item h3{margin:0 auto 16px;max-width:92%;text-align:center;font-size:18px;line-height:1.28;letter-spacing:-.25px;font-weight:950;color:#fff}.item .url{display:block;direction:ltr;text-align:center;color:rgba(255,255,255,.60);font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}.item .open{display:block;margin-top:10px;color:var(--yellow);font-size:12px;font-weight:950;text-align:left;text-decoration:none}.empty{padding:30px;text-align:center;color:var(--muted);font-weight:850;line-height:1.5}.error{border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);border-radius:18px}.raw{direction:ltr;text-align:left;white-space:pre-wrap;overflow:auto;max-height:520px;background:#03080b;border:1px solid var(--faint);border-radius:16px;padding:12px;color:#d7e3e8;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}details summary{cursor:pointer;color:var(--yellow);font-weight:950;margin-bottom:10px}@media(max-width:760px){body{padding:0}.wrap{border-radius:0;min-height:100vh}.grid{grid-template-columns:1fr}.source-hero{align-items:flex-start}.source-meta{text-align:right}.brand-logo{height:32px}.item h3{font-size:17px;max-width:100%}}@media(prefers-color-scheme:light){.brand-logo-dark{display:none}.brand-logo-light{display:block}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <div class="brandline"><div><img class="brand-logo brand-logo-dark" src="./assets/poenta-logo.png" alt="Poenta"><img class="brand-logo brand-logo-light" src="./assets/poenta-logo-light.png" alt="Poenta"></div><div class="kicker">RSS XML</div></div>
      <h1>מסך RSS מלא</h1>
      <p class="sub">בחירת מקור RSS והצגת הפריטים האחרונים ישירות מה־XML של המקור — בתצוגת כרטיסים כמו בדוגמה.</p>
      <div class="toolbar">
        <label>מקור<select id="sourceFilter"><option value="all">כל המקורות</option></select></label>
        <label>תחום<select id="domainFilter"><option value="all">כל התחומים</option></select></label>
        <label>RSS<select id="rssSelect" class="source-select"><option value="">טוען RSS…</option></select></label>
        <button class="btn" id="refresh">רענון XML</button>
        <a class="btn secondary" id="openOriginal" href="#" target="_blank" rel="noopener">פתח XML מקורי</a>
        <a class="btn" href="feedback-dashboard.html">חזרה לדשבורד</a>
        <div class="count" id="count">—</div>
      </div>
    </section>

    <section class="panel">
      <div class="source-hero">
        <div><span class="source-pill" id="sourceBadge">RSS</span><div class="source-name" id="sourceTitle">טוען…</div><span class="source-url" id="sourceUrl">—</span></div>
        <div class="source-meta"><strong>פריטים אחרונים מהמקור</strong><span id="itemCount">—</span></div>
      </div>
    </section>

    <section class="panel"><span class="status" id="statusPill">טוען</span><span class="hint" id="fetchHint">מביא XML מהמקור…</span></section>
    <section class="grid" id="items"><div class="empty">טוען RSS…</div></section>
    <section class="panel"><details><summary>הצג XML גולמי לבדיקה טכנית</summary><pre class="raw" id="rawXml">—</pre></details></section>
    <div class="hint" id="status"></div>
  </main>
<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const text=(node,sel)=>node?.querySelector(sel)?.textContent?.trim()||'';
let feedData=null,catalog=[],visibleRows=[];
function parseDate(x){if(!x)return null;const d=new Date(x);return Number.isNaN(d.getTime())?null:d}
function normKey(s){return String(s||'').toLowerCase().replace(/[\s\-–—־_״"'׳:|()\[\].,]+/g,' ').trim()}
function canonicalSource(name){const s=String(name||''),low=s.toLowerCase();if(s.includes('וואלה')||low.includes('walla'))return 'וואלה';if(low.includes('ynet'))return 'ynet';if(s.includes('גלובס'))return 'גלובס';if(s.includes('הארץ')||low.includes('haaretz'))return 'הארץ';if(s.includes('ישראל היום'))return 'ישראל היום';if(s.includes('מעריב')||low.includes('maariv'))return 'מעריב';if(s.includes('N12')||low.includes('mako'))return 'N12';return s.split(' - ')[0].trim()||'מקור'}
function activityFor(src){const acts=feedData?.sourceActivity||[];const name=normKey(src.name),logo=normKey(src.logo),cat=normKey(src.categoryHint);let candidates=acts.filter(a=>normKey(a.subSource)===name||normKey(a.source)===name);if(!candidates.length&&logo)candidates=acts.filter(a=>normKey(a.source)===logo&&(!cat||normKey(a.category)===cat));if(!candidates.length&&logo)candidates=acts.filter(a=>normKey(a.source)===logo);let best=null;for(const a of candidates){const d=parseDate(a.publishedAt);if(d&&(!best||d>best.date))best={date:d,item:a};}return best}
function rows(){return (catalog||[]).filter(src=>src.rss).map((src,idx)=>{const act=activityFor(src),domain=src.categoryHint||'חדשות';return {idx,name:src.name||'RSS',source:src.logo||canonicalSource(src.name),domain,url:src.rss,latest:act?.date||null,items:Number(src.lastValidatedItems||0)}})}
function fill(sel,values,label){const old=sel.value||'all';sel.innerHTML=`<option value="all">${label}</option>`+values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');sel.value=values.includes(old)?old:'all'}
function updateSelectors(){const all=rows();fill($('#sourceFilter'),[...new Set(all.map(r=>r.source))].sort((a,b)=>a.localeCompare(b,'he')),'כל המקורות');fill($('#domainFilter'),[...new Set(all.map(r=>r.domain))].sort((a,b)=>a.localeCompare(b,'he')),'כל התחומים');const src=$('#sourceFilter').value,dom=$('#domainFilter').value;visibleRows=all.filter(r=>(src==='all'||r.source===src)&&(dom==='all'||r.domain===dom)).sort((a,b)=>(b.latest?b.latest.getTime():0)-(a.latest?a.latest.getTime():0)||a.source.localeCompare(b.source,'he')||a.name.localeCompare(b.name,'he'));$('#rssSelect').innerHTML=visibleRows.map((r,i)=>`<option value="${i}">${esc(r.source)} · ${esc(r.name)} · ${esc(r.domain)}</option>`).join('')||'<option value="">אין RSS מתאים</option>';$('#count').textContent=`${visibleRows.length} RSS בסינון`;}
function selectedRow(){return visibleRows[Number($('#rssSelect').value)||0]}
function sourceBadge(name,url){const raw=String(name||'').trim();const low=(raw+' '+url).toLowerCase();if(low.includes('ynet'))return 'ynet';if(low.includes('walla')||raw.includes('וואלה'))return 'וואלה';if(low.includes('maariv')||raw.includes('מעריב'))return 'מעריב';if(low.includes('mako')||raw.includes('N12'))return 'N12';if(raw.includes('ישראל היום'))return 'ישראל היום';if(raw.includes('הארץ')||low.includes('haaretz'))return 'הארץ';return raw.split(/[·\-–|]/)[0].trim().slice(0,16)||'RSS'}
function fmtDate(value){if(!value)return '—';const d=new Date(value);return Number.isNaN(d.getTime())?value:new Intl.DateTimeFormat('he-IL',{timeZone:'Asia/Jerusalem',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)}
function decodeHtml(html){const t=document.createElement('textarea');t.innerHTML=html||'';return t.value.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}
function cacheBustUrl(url){try{const u=new URL(url);u.searchParams.set('_poanta_cb',String(Date.now()));return u.toString()}catch{return url}}
function isGoogleNewsUrl(url){try{return new URL(url).hostname==='news.google.com'}catch{return false}}
async function fetchWithTimeout(url,options={},timeoutMs=6500){const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),timeoutMs);try{return await fetch(url,{...options,signal:ctrl.signal})}finally{clearTimeout(timer)}}
async function fetchText(url){const r=await fetchWithTimeout(cacheBustUrl(url),{cache:'no-store'},4500);if(!r.ok)throw new Error('HTTP '+r.status);const body=await r.text();if(!body.trim())throw new Error('empty response');return {text:body,via:'direct-xml'}}
async function fetchRssJson(url){const r=await fetchWithTimeout('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(cacheBustUrl(url)),{cache:'no-store'},8500);if(!r.ok)throw new Error('rss2json HTTP '+r.status);const data=await r.json();if(data.status!=='ok')throw new Error(data.message||'rss2json failed');return {data,via:'rss2json'}}
function byNewestFirst(items){return [...items].sort((a,b)=>{const da=Date.parse(a.date||'');const db=Date.parse(b.date||'');if(Number.isNaN(da)&&Number.isNaN(db))return 0;if(Number.isNaN(da))return 1;if(Number.isNaN(db))return -1;return db-da})}
function parseRssJson(data){const feed=data.feed||{};const items=(data.items||[]).map(it=>({title:it.title||'ללא כותרת',link:it.link||'',date:it.pubDate||'',guid:it.guid||it.link||''}));return {title:feed.title||selectedRow()?.name||'RSS',items:byNewestFirst(items).slice(0,30)}}
function parseFeed(xmlText){const doc=new DOMParser().parseFromString(xmlText,'application/xml');const parseError=doc.querySelector('parsererror');if(parseError)throw new Error(parseError.textContent.replace(/\s+/g,' ').slice(0,220));const channel=doc.querySelector('channel')||doc.querySelector('feed')||doc.documentElement;const atom=doc.documentElement?.localName==='feed';const rawItems=[...doc.querySelectorAll(atom?'entry':'item')];const items=rawItems.map(it=>{const linkEl=it.querySelector('link');const link=atom?(linkEl?.getAttribute('href')||linkEl?.textContent||''):text(it,'link');return {title:text(it,'title')||'ללא כותרת',link,date:text(it,'pubDate')||text(it,'published')||text(it,'updated')||text(it,'dc\\:date')||'',guid:text(it,'guid')||text(it,'id')||''};});return {title:text(channel,'title')||selectedRow()?.name||'RSS',items:byNewestFirst(items).slice(0,30)}}
function renderFeed(feed,xml,via){$('#statusPill').textContent='נטען';$('#statusPill').className='status ok';$('#fetchHint').textContent=via==='direct-xml'?'נטען ישירות מה־XML של המקור.':'הפריטים הובאו מה־RSS/XML של המקור דרך המרת RSS→JSON כי הדפדפן חסום ב־CORS.';$('#sourceTitle').textContent=feed.title||selectedRow()?.name||'RSS';$('#itemCount').textContent=`${feed.items.length} פריטים מוצגים`;$('#items').innerHTML=feed.items.length?feed.items.map((it,i)=>`<article class="item"><div class="item-head"><span>#${i+1}</span><span>${esc(fmtDate(it.date))}</span></div><h3>${esc(it.title)}</h3>${it.link?`<a class="url" href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.link)}</a><a class="open" href="${esc(it.link)}" target="_blank" rel="noopener">פתח כתבה מקורית</a>`:`<span class="url">${esc(it.guid||'אין קישור')}</span>`}</article>`).join(''):'<div class="empty">לא נמצאו פריטים ב־XML.</div>';$('#rawXml').textContent=xml.slice(0,200000)}
async function loadSelected(){const r=selectedRow();if(!r){$('#items').innerHTML='<div class="empty">אין RSS בסינון הנוכחי.</div>';return;}$('#sourceBadge').textContent=sourceBadge(r.name,r.url);$('#sourceTitle').textContent=r.name;$('#sourceUrl').textContent=r.url;$('#openOriginal').href=r.url;$('#statusPill').textContent='טוען XML';$('#statusPill').className='status';$('#fetchHint').textContent='מביא XML מהמקור…';$('#itemCount').textContent='—';$('#items').innerHTML='<div class="empty">מביא XML וממיר לכרטיסים…</div>';try{if(isGoogleNewsUrl(r.url)){const result=await fetchRssJson(r.url);renderFeed(parseRssJson(result.data),JSON.stringify(result.data,null,2),result.via);return}try{const result=await fetchText(r.url);renderFeed(parseFeed(result.text),result.text,result.via);return}catch(directError){const result=await fetchRssJson(r.url);renderFeed(parseRssJson(result.data),JSON.stringify(result.data,null,2),result.via);return}}catch(e){$('#statusPill').textContent='שגיאה';$('#statusPill').className='status fail';$('#items').innerHTML=`<div class="empty error"><strong>לא הצלחתי להביא XML עדכני.</strong><br><span>${esc(e.message)}</span><br><br><a class="btn secondary" href="${esc(r.url)}" target="_blank" rel="noopener">פתח XML מקורי</a></div>`;$('#rawXml').textContent='—';}}
async function load(){ $('#status').textContent='טוען…'; try{const [feed,cfg]=await Promise.all([fetch('feed.json',{cache:'no-store'}).then(r=>r.json()),fetch('rss_sources.json',{cache:'no-store'}).then(r=>r.json())]);feedData=feed;catalog=Array.isArray(cfg?.active)?cfg.active:[];updateSelectors();await loadSelected();$('#status').textContent=`עודכן: ${new Date().toLocaleString('he-IL')} · סך RSS פעילים: ${catalog.filter(x=>x.rss).length}`;}catch(e){$('#items').innerHTML=`<div class="empty error">שגיאה בטעינת RSS: ${esc(e.message)}</div>`;$('#status').textContent='';}}
['sourceFilter','domainFilter'].forEach(id=>$('#'+id).addEventListener('change',()=>{updateSelectors();loadSelected();}));$('#rssSelect').addEventListener('change',loadSelected);$('#refresh').addEventListener('click',loadSelected);load();
</script>
</body>
</html>
